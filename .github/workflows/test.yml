name: test

# Manual-only for now: GitHub Actions is unavailable on this account (billing lock),
# so auto-run on push is disabled to avoid a perpetual red X. To re-enable CI once
# Actions is available, replace the line below with:
#   push:
#     branches: [master, main]
#   pull_request:
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --test
